<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révision Darja Algérien - Cours Complet</title>
    <style>
        :root {
            --primary: #006633;
            --secondary: #D21034;
            --light: #f4f4f4;
            --dark: #333;
            --highlight: #e6f9ed;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--primary); text-align: center; }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            margin-bottom: 20px;
            display: none; 
        }
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }
        #start-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(210, 16, 52, 0.4);
            margin-bottom: 20px;
        }
        #start-btn:active { transform: scale(0.95); }
        .warning { color: #555; font-size: 0.9em; max-width: 300px; }
        #lesson-selector {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: gray;
            flex-grow: 1;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 4px solid var(--primary);
            margin-bottom: -2px;
        }
        .section { display: none; }
        .section.active { display: block; }
        h2 {
            color: var(--secondary);
            font-size: 1.2em;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        .vocab-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }
        .vocab-item.highlight {
            background-color: var(--highlight);
            border-left: 4px solid var(--primary);
        }
        .vocab-text { display: flex; flex-direction: column; }
        .arabe {
            font-size: 1.4em;
            font-weight: bold;
            text-align: right;
            direction: rtl;
        }
        .traductions { font-size: 0.9em; color: #555; margin-top: 3px; }
        button.audio-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            min-width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            -webkit-tap-highlight-color: transparent;
        }
        button.audio-btn:active { opacity: 0.7; }
        .question-text {
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
        }
        .big-audio-btn {
            font-size: 3em;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .big-audio-btn:active { transform: scale(0.95); }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button.option-btn {
            padding: 15px;
            font-size: 1em;
            border: 1px solid #ccc;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button.option-btn:active { background: #e9e9e9; }
        button.option-btn.correct { background: var(--primary); color: white; border-color: var(--primary); }
        button.option-btn.wrong { background: var(--secondary); color: white; border-color: var(--secondary); }
        button.option-btn .arabe { margin-bottom: 5px; }
        .score-container { text-align: center; margin-top: 15px; font-weight: bold; }
        .action-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
        }
        #stop-all-btn { background: var(--secondary); }
        #play-all-btn { background: #005bb5; }
        .empty-state { text-align: center; color: gray; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

    <h1>🇩🇿 Apprendre le Darja</h1>

    <div id="start-screen">
        <button id="start-btn" onclick="initApp()">Démarrer l'application 🔊</button>
        <p class="warning">⚠️ Assurez-vous que le mode silencieux est désactivé.</p>
    </div>

    <div class="container" id="main-app">
        <select id="lesson-selector" onchange="changeLesson()">
            <option value="10">📖 Leçon 10 (Nouveau !)</option>
            <option value="9">📖 Leçon 9 (Nouveau !)</option>
            <option value="8">📖 Leçon 8</option>
            <option value="7">📖 Leçon 7</option>
            <option value="6">📖 Leçon 6</option>
            <option value="5">📖 Leçon 5</option>
            <option value="4">📖 Leçon 4</option>
            <option value="3">📖 Leçon 3</option>
            <option value="2">📖 Leçon 2</option>
            <option value="1">📖 Leçon 1</option>
            <option value="all">📚 Toutes les leçons</option>
        </select>

        <div class="tabs">
            <div class="tab active" onclick="showSection('vocab')">Vocabulaire</div>
            <div class="tab" onclick="showSection('quiz-trad')">Quiz Texte</div>
            <div class="tab" onclick="showSection('quiz-audio')">Quiz Audio</div>
        </div>

        <div id="vocab" class="section active">
            <button id="play-all-btn" class="action-btn" onclick="startPlayAll()">🎧 Écouter & Répéter</button>
            <button id="stop-all-btn" class="action-btn" style="display: none;" onclick="stopPlayAll()">⏹️ Arrêter</button>
            <p style="text-align: center; font-size: 0.9em; color: gray; margin-top: 15px;"><i>Clique sur l'icône 🔊 pour écouter un mot précis.</i></p>
            <h2>Mots de base</h2>
            <div id="vocab-mots"></div>
            <h2>Phrases complètes</h2>
            <div id="vocab-phrases"></div>
        </div>

        <div id="quiz-trad" class="section">
            <div class="question-text" id="question-trad"></div>
            <div class="options" id="options-trad"></div>
            <button class="action-btn" id="next-btn-trad" style="display:none;" onclick="nextTradQuestion()">Question suivante ➡️</button>
            <div class="score-container">Score : <span id="score-trad">0</span> / <span id="total-trad">0</span></div>
        </div>

        <div id="quiz-audio" class="section">
            <div class="question-text">
                <button class="big-audio-btn" onclick="playCurrentAudio()" title="Écouter">🔊</button>
                Écoute et choisis la bonne traduction :
            </div>
            <div class="options" id="options-audio"></div>
            <button class="action-btn" id="next-btn-audio" style="display:none;" onclick="nextAudioQuestion()">Question suivante ➡️</button>
            <div class="score-container">Score : <span id="score-audio">0</span> / <span id="total-audio">0</span></div>
        </div>
    </div>

    <audio id="audio-player" style="display:none;"></audio>

            {ar:"العايلة",tr:"el a’aila",fr:"La famille",tts:"الْعَايْلَة",type:"mot",lesson:10},

            {ar:"أنا مانعيشش ف هاد لمدينة",tr:"ana ma n’aichech f had lemdina",fr:"Je ne vis pas dans cette ville",tts:"أَنَا مَانْعِيشْشْ فْ هَادْ لْمْدِينَة",type:"phrase",lesson:10},
            {ar:"أنا مانحبش",tr:"ana manhabech",fr:"Je n'aime pas",tts:"أَنَا مَانْحَبْشْ",type:"phrase",lesson:10},
            {ar:"أنا مانحبش هاد لمدينة",tr:"ana manhabech had lemdina",fr:"Je n'aime pas cette ville",tts:"أَنَا مَانْحَبْشْ هَادْ لْمْدِينَة",type:"phrase",lesson:10},
            {ar:"أنا مانتعلمش كل يوم",tr:"ana ma nett’allamch koull youm",fr:"Je n'apprends pas tous les jours",tts:"أَنَا مَانْتْعَلَّمْشْ كُلْ يُومْ",type:"phrase",lesson:10},
            {ar:"إنتا تتعلم كل يوم؟",tr:"enta tett’allam koull youm?",fr:"Tu apprends tous les jours ? (homme)",tts:"إِنْتَا تْتْعَلَّمْ كُلْ يُومْ؟",type:"phrase",lesson:10},
            {ar:"لا، أنا مانتعلمش كل يوم",tr:"lla, ana ma nett’allamch koul youm",fr:"Non, je n'apprends pas tous les jours",tts:"لَا، أَنَا مَانْتْعَلَّمْشْ كُلْ يُومْ",type:"phrase",lesson:10},
            {ar:"الخدمة تاعي",tr:"el khedma ta’ai",fr:"Mon travail",tts:"الْخَدْمَة تَاعِي",type:"phrase",lesson:10},
            {ar:"العايلة تاعك إنتا",tr:"el a’aila ta’ak enta",fr:"Ta famille (homme)",tts:"الْعَايْلَة تَاعَكْ إِنْتَا",type:"phrase",lesson:10},
            {ar:"العايلة تاعك إنتي",tr:"el a’aila ta’ak enti",fr:"Ta famille (femme)",tts:"الْعَايْلَة تَاعَكْ إِنْتِي",type:"phrase",lesson:10},
            {ar:"العايلة تاعي أنا",tr:"el a’aila ta’ai ana",fr:"Ma famille à moi",tts:"الْعَايْلَة تَاعِي أَنَا",type:"phrase",lesson:10},
            {ar:"مع العايلة تاعي أنا",tr:"ma’a el a’aila ta’ai ana",fr:"Avec ma famille",tts:"مْعَ الْعَايْلَة تَاعِي أَنَا",type:"phrase",lesson:10},
            {ar:"أنا نعيش",tr:"ana na’aich",fr:"Je vis",tts:"أَنَا نْعِيشْ",type:"phrase",lesson:10},
            {ar:"أنا نعيش مع العايلة تاعي",tr:"ana na’aich ma’a el a’aila ta’ai",fr:"Je vis avec ma famille",tts:"أَنَا نْعِيشْ مْعَ الْعَايْلَة تَاعِي",type:"phrase",lesson:10},
            {ar:"أنا مانعيشش مع العايلة تاعي",tr:"ana ma na’aichech ma’a el a’aila ta’ai",fr:"Je ne vis pas avec ma famille",tts:"أَنَا مَانْعِيشْشْ مْعَ الْعَايْلَة تَاعِي",type:"phrase",lesson:10}
        ];

        let activeData = [];
        let currentQuestion = null;
        let scoreTrad = 0, totalTrad = 0;
        let scoreAudio = 0, totalAudio = 0;
        
        let isPlayingAll = false;
        let playIndex = 0;
        let sequenceTimeout = null;
        
        const audioPlayer = document.getElementById('audio-player');

        function initApp() {
            audioPlayer.play().catch(e => console.log("Init audio player silent error"));
            audioPlayer.pause();
            
            if ('speechSynthesis' in window) {
                let msg = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(msg);
            }

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            changeLesson();
        }

        function playAudio(ttsText) {
            stopPlayAll(); 
            audioPlayer.onended = null;
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(ttsText)}`;
            
            audioPlayer.src = url;
            audioPlayer.play().catch(error => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(ttsText);
                    utterance.lang = 'ar-SA';
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        function playCurrentAudio() {
            if (currentQuestion) playAudio(currentQuestion.tts);
        }

        function startPlayAll() {
            if(activeData.length === 0) return;
            isPlayingAll = true;
            playIndex = 0;
            
            document.getElementById('play-all-btn').style.display = 'none';
            document.getElementById('stop-all-btn').style.display = 'block';
            
            playSequence();
        }

        function stopPlayAll() {
            isPlayingAll = false;
            audioPlayer.onended = null;
            audioPlayer.pause();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            clearTimeout(sequenceTimeout);
            
            document.getElementById('play-all-btn').style.display = 'block';
            document.getElementById('stop-all-btn').style.display = 'none';
            
            document.querySelectorAll('.vocab-item').forEach(el => el.classList.remove('highlight'));
        }

        function speakWord(text, lang, callback) {
            if (!isPlayingAll) return;

            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${lang}&client=tw-ob&q=${encodeURIComponent(text)}`;
            audioPlayer.src = url;
            
            audioPlayer.onended = function() {
                audioPlayer.onended = null;
                if (callback) callback();
            };

            audioPlayer.play().catch(error => {
                audioPlayer.onended = null;
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    let utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang === 'fr' ? 'fr-FR' : 'ar-SA';
                    
                    utterance.onend = function() {
                        if (callback) callback();
                    };
                    utterance.onerror = function() {
                        if (callback) callback(); 
                    };
                    
                    window.speechSynthesis.speak(utterance);
                } else {
                    stopPlayAll();
                }
            });
        }

        function playSequence() {
            if (!isPlayingAll || playIndex >= activeData.length) {
                stopPlayAll();
                return;
            }

            document.querySelectorAll('.vocab-item').forEach(el => el.classList.remove('highlight'));
            let currentElement = document.getElementById('vocab-item-' + playIndex);
            if(currentElement) {
                currentElement.classList.add('highlight');
                currentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            let currentItem = activeData[playIndex];
            
            speakWord(currentItem.fr, 'fr', function() {
                if (!isPlayingAll) return;
                
                speakWord(currentItem.tts, 'ar', function() {
                    if (!isPlayingAll) return;
                    
                    let pauseTime = Math.max(2000, currentItem.tts.length * 120); 
                    sequenceTimeout = setTimeout(() => {
                        playIndex++;
                        playSequence();
                    }, pauseTime);
                });
            });
        }

        function changeLesson() {
            stopPlayAll();
            const selector = document.getElementById('lesson-selector');
            const choice = selector.value;
            if (choice === "all") {
                activeData = [...allLessonData];
            } else {
                activeData = allLessonData.filter(item => item.lesson == choice);
            }
            renderVocab();
            startTradQuiz();
            startAudioQuiz();
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }

        function renderVocab() {
            const listMots = document.getElementById('vocab-mots');
            const listPhrases = document.getElementById('vocab-phrases');
            listMots.innerHTML = ''; listPhrases.innerHTML = '';
            
            let hasMots = false;
            let hasPhrases = false;

            activeData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'vocab-item';
                div.id = 'vocab-item-' + index;
                
                div.innerHTML = `
                    <div class="vocab-text">
                        <span class="arabe">${item.ar}</span>
                        <span class="traductions"><b>${item.tr}</b><br>${item.fr}</span>
                    </div>
                    <button class="audio-btn" onclick="playAudio('${item.tts}')" title="Écouter">🔊</button>
                `;
                if (item.type === 'mot') {
                    listMots.appendChild(div);
                    hasMots = true;
                } else {
                    listPhrases.appendChild(div);
                    hasPhrases = true;
                }
            });

            if(!hasMots) listMots.innerHTML = "<div class='empty-state'>Aucun mot simple dans cette sélection.</div>";
            if(!hasPhrases) listPhrases.innerHTML = "<div class='empty-state'>Aucune phrase dans cette sélection.</div>";
        }

        function getOptions(correctItem) {
            let options = [correctItem];
            let distractors = allLessonData.filter(item => item.type === correctItem.type && item !== correctItem);
            distractors.sort(() => Math.random() - 0.5);
            if (distractors.length > 0) options.push(distractors[0]);
            if (distractors.length > 1) options.push(distractors[1]);
            return options.sort(() => Math.random() - 0.5);
        }

        function startTradQuiz() {
            scoreTrad = 0; totalTrad = 0;
            updateScore('trad', scoreTrad, totalTrad);
            nextTradQuestion();
        }

        function nextTradQuestion() {
            document.getElementById('next-btn-trad').style.display = 'none';
            if(activeData.length === 0) return;
            
            currentQuestion = activeData[Math.floor(Math.random() * activeData.length)];
            document.getElementById('question-trad').innerHTML = `Traduisez :<br><span style="color:var(--primary); font-size:1.3em;">"${currentQuestion.fr}"</span>`;
            
            const container = document.getElementById('options-trad');
            container.innerHTML = '';
            getOptions(currentQuestion).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="arabe">${opt.ar}</span><span>${opt.tr}</span>`;
                btn.onclick = () => checkAnswer(btn, opt, 'trad');
                container.appendChild(btn);
            });
        }

        function startAudioQuiz() {
            scoreAudio = 0; totalAudio = 0;
            updateScore('audio', scoreAudio, totalAudio);
            nextAudioQuestion();
        }

        function nextAudioQuestion() {
            document.getElementById('next-btn-audio').style.display = 'none';
            if(activeData.length === 0) return;

            currentQuestion = activeData[Math.floor(Math.random() * activeData.length)];
            const container = document.getElementById('options-audio');
            container.innerHTML = '';
            getOptions(currentQuestion).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<b>${opt.fr}</b>`; 
                btn.onclick = () => checkAnswer(btn, opt, 'audio');
                container.appendChild(btn);
            });
        }

        function checkAnswer(button, selectedOption, type) {
            const containerId = type === 'trad' ? 'options-trad' : 'options-audio';
            const nextBtnId = type === 'trad' ? 'next-btn-trad' : 'next-btn-audio';
            const buttons = document.getElementById(containerId).querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (type === 'trad') {
                totalTrad++;
                if (selectedOption === currentQuestion) scoreTrad++;
                updateScore('trad', scoreTrad, totalTrad);
            } else {
                totalAudio++;
                if (selectedOption === currentQuestion) scoreAudio++;
                updateScore('audio', scoreAudio, totalAudio);
            }

            if (selectedOption === currentQuestion) {
                button.classList.add('correct');
                if (type === 'trad') playAudio(currentQuestion.tts);
            } else {
                button.classList.add('wrong');
                buttons.forEach(btn => {
                    const matchText = type === 'trad' ? currentQuestion.ar : currentQuestion.fr;
                    if (btn.innerHTML.includes(matchText)) {
                        btn.classList.add('correct');
                    }
                });
            }
            document.getElementById(nextBtnId).style.display = 'block';
        }

        function updateScore(type, score, total) {
            document.getElementById(`score-${type}`).innerText = score;
            document.getElementById(`total-${type}`).innerText = total;
        }
    </script>
