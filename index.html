<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révision Darja Algérien - Cours Complet</title>
    <style>
        :root {
            --primary: #006633;
            --secondary: #D21034;
            --light: #f4f4f4;
            --dark: #333;
            --highlight: #e6f9ed;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--primary); text-align: center; }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            margin-bottom: 20px;
            display: none; /* Caché jusqu'à l'activation pour iOS */
        }
        
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }
        #start-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(210, 16, 52, 0.4);
            margin-bottom: 20px;
        }
        #start-btn:active { transform: scale(0.95); }
        .warning { color: #555; font-size: 0.9em; max-width: 300px; }

        #lesson-selector {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: gray;
            flex-grow: 1;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 4px solid var(--primary);
            margin-bottom: -2px;
        }
        .section { display: none; }
        .section.active { display: block; }
        h2 {
            color: var(--secondary);
            font-size: 1.2em;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        
        /* Liste Vocabulaire */
        .vocab-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }
        .vocab-item.highlight {
            background-color: var(--highlight);
            border-left: 4px solid var(--primary);
        }
        .vocab-text { display: flex; flex-direction: column; }
        .arabe {
            font-size: 1.4em;
            font-weight: bold;
            text-align: right;
            direction: rtl;
        }
        .traductions { font-size: 0.9em; color: #555; margin-top: 3px; }
        button.audio-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            min-width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            -webkit-tap-highlight-color: transparent;
        }
        button.audio-btn:active { opacity: 0.7; }
        
        /* Quiz */
        .question-text {
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
        }
        .big-audio-btn {
            font-size: 3em;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .big-audio-btn:active { transform: scale(0.95); }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button.option-btn {
            padding: 15px;
            font-size: 1em;
            border: 1px solid #ccc;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button.option-btn:active { background: #e9e9e9; }
        button.option-btn.correct { background: var(--primary); color: white; border-color: var(--primary); }
        button.option-btn.wrong { background: var(--secondary); color: white; border-color: var(--secondary); }
        button.option-btn .arabe { margin-bottom: 5px; }
        .score-container { text-align: center; margin-top: 15px; font-weight: bold; }
        
        /* Boutons d'action larges */
        .action-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
        }
        #stop-all-btn { background: var(--secondary); }
        #play-all-btn { background: #005bb5; }
        .empty-state { text-align: center; color: gray; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

    <h1>🇩🇿 Apprendre le Darja</h1>

    <div id="start-screen">
        <button id="start-btn" onclick="initApp()">Démarrer l'application 🔊</button>
        <p class="warning">⚠️ Assurez-vous que le mode silencieux est désactivé.</p>
    </div>

    <div class="container" id="main-app">
        
        <select id="lesson-selector" onchange="changeLesson()">
            <option value="3">📖 Leçon 3</option>
            <option value="2">📖 Leçon 2</option>
            <option value="1">📖 Leçon 1</option>
            <option value="all">📚 Toutes les leçons mélangées</option>
        </select>

        <div class="tabs">
            <div class="tab active" onclick="showSection('vocab')">Vocabulaire</div>
            <div class="tab" onclick="showSection('quiz-trad')">Quiz Texte</div>
            <div class="tab" onclick="showSection('quiz-audio')">Quiz Audio</div>
        </div>

        <div id="vocab" class="section active">
            <button id="play-all-btn" class="action-btn" onclick="startPlayAll()">🎧 Écouter & Répéter la leçon</button>
            <button id="stop-all-btn" class="action-btn" style="display: none;" onclick="stopPlayAll()">⏹️ Arrêter la lecture</button>
            
            <p style="text-align: center; font-size: 0.9em; color: gray; margin-top: 15px;"><i>Clique sur l'icône 🔊 pour écouter un mot précis.</i></p>
            
            <h2>Mots de base</h2>
            <div id="vocab-mots"></div>
            <h2>Phrases complètes</h2>
            <div id="vocab-phrases"></div>
        </div>

        <div id="quiz-trad" class="section">
            <div class="question-text" id="question-trad"></div>
            <div class="options" id="options-trad"></div>
            <button class="action-btn" id="next-btn-trad" style="display:none;" onclick="nextTradQuestion()">Question suivante ➡️</button>
            <div class="score-container">Score : <span id="score-trad">0</span> / <span id="total-trad">0</span></div>
        </div>

        <div id="quiz-audio" class="section">
            <div class="question-text">
                <button class="big-audio-btn" onclick="playCurrentAudio()" title="Écouter">🔊</button>
                Écoute et choisis la bonne traduction :
            </div>
            <div class="options" id="options-audio"></div>
            <button class="action-btn" id="next-btn-audio" style="display:none;" onclick="nextAudioQuestion()">Question suivante ➡️</button>
            <div class="score-container">Score : <span id="score-audio">0</span> / <span id="total-audio">0</span></div>
        </div>
    </div>

    <audio id="audio-player" style="display:none;"></audio>

    <script>
        const allLessonData = [

            { ar: "عربية", tr: "'arbiya", fr: "Arabe", tts: "عَرْبِيَّة", type: "mot", lesson: 1 },
            { ar: "دارجة دزايرية", tr: "darja dzyrya", fr: "Darja algérien", tts: "دَارْجَة دْزَايْرِيَّة", type: "mot", lesson: 1 },
            { ar: "أنا نهدر فرنسي", tr: "ana nahder fransè", fr: "Je parle français", tts: "أَنَا نَهْدَرْ فْرَانْسِي", type: "phrase", lesson: 1 },
            { ar: "أنتَ تهدر فرنسي", tr: "enta tahder fransè", fr: "Tu parles français (homme)", tts: "أَنْتَ تَهْدَرْ فْرَانْسِي", type: "phrase", lesson: 1 },

            { ar: "صباح الخير أنا نهدر فرنسي", tr: "sabah el hair, ana nahder fransè", fr: "Bonjour, je parle français", tts: "صَبَاحْ الْخِيرْ أَنَا نَهْدَرْ فْرَانْسِي", type: "phrase", lesson: 1 },

            // --- LEÇON 2 ---

            { ar: "لونگلي", tr: "langlè", fr: "L'anglais", tts: "لُونْغْلِي", type: "mot", lesson: 2 },

            { ar: "إنتي تتعلمي", tr: "enti tata’alami", fr: "Tu apprends (femme)", tts: "إِنْتِي تْتْعَلَّمِي", type: "phrase", lesson: 2 },
            { ar: "إنتا تهضر فرونصي", tr: "enta tahdar fransè", fr: "Tu parles français (homme)", tts: "إِنْتَا تَهْدَرْ فْرُونْصِي", type: "phrase", lesson: 2 },
            { ar: "إنتا تتعلم فرونصي", tr: "enta tata’alam fransè", fr: "Tu apprends le français (homme)", tts: "إِنْتَا تْتْعَلَّمْ فْرُونْصِي", type: "phrase", lesson: 2 },
            { ar: "إنتم تهضرو", tr: "entoum tahdro", fr: "Vous parlez", tts: "إِنْتُمْ تَهْدْرُوا", type: "phrase", lesson: 2 },

            { ar: "إنتم تتعلمو دارجة دزايرية", tr: "entoum tata’alamou darja dziri’ya", fr: "Vous apprenez le darja", tts: "إِنْتُمْ تْتْعَلْمُوا دَارْجَة دْزِيرِيَّة", type: "phrase", lesson: 2 },

            { ar: "إنتيا تتعلمي لفرونصي؟", tr: "entia tata’alami el fransè?", fr: "Tu apprends le français ? (Question femme)", tts: "إِنْتِيَا تْتْعَلْمِي لْفْرُونْصِي", type: "phrase", lesson: 2 },
            { ar: "صباح الخير، إنتا تهضر أونگلي؟", tr: "sabah el kheyr, enta tahdar anglè?", fr: "Bonjour, tu parles anglais ?", tts: "صَبَاحْ الْخِيرْ، إِنْتَا تَهْدَرْ أُونْغْلِي", type: "phrase", lesson: 2 },
            { ar: "إنتما تهضرو فرونصي؟", tr: "entouma tahdro fransè?", fr: "Vous parlez français ?", tts: "إِنْتُمَا تَهْدْرُوا فْرُونْصِي", type: "phrase", lesson: 2 },
            { ar: "أنا مانهضرش", tr: "ana ma nahdarsh", fr: "Je ne parle pas", tts: "أَنَا مَانَهْدَرْشْ", type: "phrase", lesson: 2 },
            { ar: "أنا مانهضرش دارجة دزايرية", tr: "ana ma nahdarsh darja dziri’ya", fr: "Je ne parle pas darja algérien", tts: "أَنَا مَانَهْدَرْشْ دَارْجَة دْزِيرِيَّة", type: "phrase", lesson: 2 },
            { ar: "أنا مانهضرش فرونصي", tr: "ana ma nahdarsh fransè", fr: "Je ne parle pas français", tts: "أَنَا مَانَهْدَرْشْ فْرُونْصِي", type: "phrase", lesson: 2 },
            { ar: "أنا مانهضرش أونگلي", tr: "ana ma nahdarsh anglè", fr: "Je ne parle pas anglais", tts: "أَنَا مَانَهْدَرْشْ أُونْغْلِي", type: "phrase", lesson: 2 },
            { ar: "إنتا ماتهضرش أونگلي", tr: "enta ma tahdarsh anglè", fr: "Tu ne parles pas anglais (homme)", tts: "إِنْتَا مَاتَهْدَرْشْ أُونْغْلِي", type: "phrase", lesson: 2 },

            // --- LEÇON 3 ---
            { ar: "مليح", tr: "mlyeh", fr: "Bien / Bon", tts: "مْلِيحْ", type: "mot", lesson: 3 },
            { ar: "أنا نحب", tr: "ana nhab", fr: "J'aime", tts: "أَنَا نْحَبْ", type: "mot", lesson: 3 },
            { ar: "إنتا تحب", tr: "enta thab", fr: "Tu aimes (homme)", tts: "إِنْتَا تْحَبْ", type: "mot", lesson: 3 },
            { ar: "إنتي تحبي", tr: "enti thabi", fr: "Tu aimes (femme)", tts: "إِنْتِي تْحَبِّي", type: "mot", lesson: 3 },
            { ar: "إنتما", tr: "entouma", fr: "Vous", tts: "إِنْتُمَا", type: "mot", lesson: 3 },
            { ar: "أنا نهضر فرونصي مليح", tr: "ana nahdar fransè mlyeh", fr: "Je parle bien français", tts: "أَنَا نَهْدَرْ فْرُونْصِي مْلِيحْ", type: "phrase", lesson: 3 },
            { ar: "أنا مانهضرش مليح فرونصي", tr: "ana ma nahdarsh mlyeh fransè", fr: "Je ne parle pas bien français", tts: "أَنَا مَانَهْدَرْشْ مْلِيحْ فْرُونْصِي", type: "phrase", lesson: 3 },
            { ar: "إنتا تتعلم دارجة دزايرية", tr: "enta tata'alam darja dziri'ya", fr: "Tu apprends le darja algérien (homme)", tts: "إِنْتَا تْتْعَلَّمْ دَارْجَة دْزِيرِيَّة", type: "phrase", lesson: 3 },
            { ar: "إنتي تتعلمي دارجة دزايرية", tr: "enti tata'alami darja dziri'ya", fr: "Tu apprends le darja algérien (femme)", tts: "إِنْتِي تْتْعَلَّمِي دَارْجَة دْزِيرِيَّة", type: "phrase", lesson: 3 },
            { ar: "إنتما تهضرو مليح دارجة دزايرية", tr: "entouma tahdro mlyeh darja dziri'ya", fr: "Vous parlez bien darja algérien", tts: "إِنْتُمَا تَهْدْرُوا مْلِيحْ دَارْجَة دْزِيرِيَّة", type: "phrase", lesson: 3 },
            { ar: "إنتيا تهضري مليح فرونصي", tr: "entia tahdri mlyeh fransè", fr: "Tu parles bien français (femme)", tts: "إِنْتِيَا تَهْدْرِي مْلِيحْ فْرُونْصِي", type: "phrase", lesson: 3 },
            { ar: "أنا نحب نهضر دارجة دزايرية", tr: "ana nhab nahdar darja dziri'ya", fr: "J'aime parler darja algérien", tts: "أَنَا نْحَبْ نَهْدَرْ دَارْجَة دْزِيرِيَّة", type: "phrase", lesson: 3 },
            { ar: "أنا نحب نتعلم", tr: "ana nhab nata'alam", fr: "J'aime apprendre", tts: "أَنَا نْحَبْ نْتْعَلَّمْ", type: "phrase", lesson: 3 },
            { ar: "أنا نحب نهضر", tr: "ana nhab nahdar", fr: "J'aime parler", tts: "أَنَا نْحَبْ نَهْدَرْ", type: "phrase", lesson: 3 }
        ];

        let activeData = [];
        let currentQuestion = null;
        let scoreTrad = 0, totalTrad = 0;
        let scoreAudio = 0, totalAudio = 0;
        
        let isPlayingAll = false;
        let playIndex = 0;
        let sequenceTimeout = null;
        
        const audioPlayer = document.getElementById('audio-player');

        function initApp() {
            audioPlayer.play().catch(e => console.log("Init audio player silent error"));
            audioPlayer.pause();
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            changeLesson();
        }

        function playAudio(ttsText) {
            stopPlayAll(); // Arrête la lecture automatique si on clique manuellement
            
            audioPlayer.onended = null; // Nettoie les événements de boucle
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(ttsText)}`;
            
            audioPlayer.src = url;
            audioPlayer.play().catch(error => console.log("Erreur de lecture audio"));
        }

        function playCurrentAudio() {
            if (currentQuestion) playAudio(currentQuestion.tts);
        }

        // --- NOUVELLE FONCTIONNALITÉ : ÉCOUTER ET RÉPÉTER ---
        
        function startPlayAll() {
            if(activeData.length === 0) return;
            isPlayingAll = true;
            playIndex = 0;
            
            document.getElementById('play-all-btn').style.display = 'none';
            document.getElementById('stop-all-btn').style.display = 'block';
            
            playSequenceFr();
        }

        function stopPlayAll() {
            isPlayingAll = false;
            audioPlayer.onended = null;
            audioPlayer.pause();
            clearTimeout(sequenceTimeout);
            
            document.getElementById('play-all-btn').style.display = 'block';
            document.getElementById('stop-all-btn').style.display = 'none';
            
            // Enlève le surlignage de tous les mots
            document.querySelectorAll('.vocab-item').forEach(el => el.classList.remove('highlight'));
        }

        function playSequenceFr() {
            if (!isPlayingAll || playIndex >= activeData.length) {
                stopPlayAll();
                return;
            }

            // Surligne le mot en cours
            document.querySelectorAll('.vocab-item').forEach(el => el.classList.remove('highlight'));
            let currentElement = document.getElementById('vocab-item-' + playIndex);
            if(currentElement) {
                currentElement.classList.add('highlight');
                currentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            let currentItem = activeData[playIndex];
            
            // 1. Joue le mot en Français (tl=fr)
            const frUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=fr&client=tw-ob&q=${encodeURIComponent(currentItem.fr)}`;
            audioPlayer.src = frUrl;
            
            audioPlayer.onended = function() {
                if (!isPlayingAll) return;
                playSequenceAr(currentItem);
            };
            audioPlayer.play().catch(e => stopPlayAll());
        }

        function playSequenceAr(currentItem) {
            if (!isPlayingAll) return;
            
            // 2. Joue le mot en Darja (tl=ar avec Soukoun)
            const arUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(currentItem.tts)}`;
            audioPlayer.src = arUrl;
            
            audioPlayer.onended = function() {
                if (!isPlayingAll) return;
                
                // 3. Pause (2 secondes ou plus si la phrase est longue)
                let pauseTime = Math.max(2000, currentItem.tts.length * 120); 
                
                sequenceTimeout = setTimeout(() => {
                    if (!isPlayingAll) return;
                    playIndex++;
                    playSequenceFr();
                }, pauseTime);
            };
            audioPlayer.play().catch(e => stopPlayAll());
        }

        // --- FIN NOUVELLE FONCTIONNALITÉ ---

        function changeLesson() {
            stopPlayAll(); // Arrête l'audio si on change de leçon
            const selector = document.getElementById('lesson-selector');
            const choice = selector.value;
            if (choice === "all") {
                activeData = [...allLessonData];
            } else {
                activeData = allLessonData.filter(item => item.lesson == choice);
            }
            renderVocab();
            startTradQuiz();
            startAudioQuiz();
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }

        function renderVocab() {
            const listMots = document.getElementById('vocab-mots');
            const listPhrases = document.getElementById('vocab-phrases');
            listMots.innerHTML = ''; listPhrases.innerHTML = '';
            
            let hasMots = false;
            let hasPhrases = false;

            activeData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'vocab-item';
                div.id = 'vocab-item-' + index; // Identifiant unique pour le surlignage
                
                div.innerHTML = `
                    <div class="vocab-text">
                        <span class="arabe">${item.ar}</span>
                        <span class="traductions"><b>${item.tr}</b><br>${item.fr}</span>
                    </div>
                    <button class="audio-btn" onclick="playAudio('${item.tts}')" title="Écouter">🔊</button>
                `;
                if (item.type === 'mot') {
                    listMots.appendChild(div);
                    hasMots = true;
                } else {
                    listPhrases.appendChild(div);
                    hasPhrases = true;
                }
            });

            if(!hasMots) listMots.innerHTML = "<div class='empty-state'>Aucun mot simple dans cette sélection.</div>";
            if(!hasPhrases) listPhrases.innerHTML = "<div class='empty-state'>Aucune phrase dans cette sélection.</div>";
        }

        function getOptions(correctItem) {
            let options = [correctItem];
            let distractors = allLessonData.filter(item => item.type === correctItem.type && item !== correctItem);
            distractors.sort(() => Math.random() - 0.5);
            if (distractors.length > 0) options.push(distractors[0]);
            if (distractors.length > 1) options.push(distractors[1]);
            return options.sort(() => Math.random() - 0.5);
        }

        function startTradQuiz() {
            scoreTrad = 0; totalTrad = 0;
            updateScore('trad', scoreTrad, totalTrad);
            nextTradQuestion();
        }

        function nextTradQuestion() {
            document.getElementById('next-btn-trad').style.display = 'none';
            if(activeData.length === 0) return;
            
            currentQuestion = activeData[Math.floor(Math.random() * activeData.length)];
            document.getElementById('question-trad').innerHTML = `Traduisez :<br><span style="color:var(--primary); font-size:1.3em;">"${currentQuestion.fr}"</span>`;
            
            const container = document.getElementById('options-trad');
            container.innerHTML = '';
            getOptions(currentQuestion).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="arabe">${opt.ar}</span><span>${opt.tr}</span>`;
                btn.onclick = () => checkAnswer(btn, opt, 'trad');
                container.appendChild(btn);
            });
        }

        function startAudioQuiz() {
            scoreAudio = 0; totalAudio = 0;
            updateScore('audio', scoreAudio, totalAudio);
            nextAudioQuestion();
        }

        function nextAudioQuestion() {
            document.getElementById('next-btn-audio').style.display = 'none';
            if(activeData.length === 0) return;

            currentQuestion = activeData[Math.floor(Math.random() * activeData.length)];
            const container = document.getElementById('options-audio');
            container.innerHTML = '';
            getOptions(currentQuestion).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<b>${opt.fr}</b>`; 
                btn.onclick = () => checkAnswer(btn, opt, 'audio');
                container.appendChild(btn);
            });
        }

        function checkAnswer(button, selectedOption, type) {
            const containerId = type === 'trad' ? 'options-trad' : 'options-audio';
            const nextBtnId = type === 'trad' ? 'next-btn-trad' : 'next-btn-audio';
            const buttons = document.getElementById(containerId).querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (type === 'trad') {
                totalTrad++;
                if (selectedOption === currentQuestion) scoreTrad++;
                updateScore('trad', scoreTrad, totalTrad);
            } else {
                totalAudio++;
                if (selectedOption === currentQuestion) scoreAudio++;
                updateScore('audio', scoreAudio, totalAudio);
            }

            if (selectedOption === currentQuestion) {
                button.classList.add('correct');
                if (type === 'trad') playAudio(currentQuestion.tts);
            } else {
                button.classList.add('wrong');
                buttons.forEach(btn => {
                    const matchText = type === 'trad' ? currentQuestion.ar : currentQuestion.fr;
                    if (btn.innerHTML.includes(matchText)) {
                        btn.classList.add('correct');
                    }
                });
            }
            document.getElementById(nextBtnId).style.display = 'block';
        }

        function updateScore(type, score, total) {
            document.getElementById(`score-${type}`).innerText = score;
            document.getElementById(`total-${type}`).innerText = total;
        }
    </script>
</body>
</html>
